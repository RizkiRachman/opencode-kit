name: release
on:
  push:
    branches: [main]

jobs:
  publish:
    name: Tag + Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Get version from package.json
        id: version
        run: echo "tag=v$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        run: |
          if git tag -l "${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "  ℹ️  Tag ${{ steps.version.outputs.tag }} already exists — skipping release"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "  🚀 New version detected: ${{ steps.version.outputs.tag }}"
          fi

      - name: Install dependencies
        if: steps.check.outputs.exists == 'false'
        run: npm ci

      - name: Run tests
        if: steps.check.outputs.exists == 'false'
        run: |
          node test/integration.test.js
          node test/e2e.test.js

      - name: Create tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "opencode-kit CI"
          git config user.email "ci@opencode-kit"
          git tag "${{ steps.version.outputs.tag }}" -m "chore: release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publish to npm
        if: steps.check.outputs.exists == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
