name: release
on:
  push:
    branches: [main]

jobs:
  auto-publish:
    name: Auto patch bump → publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history to push the version bump commit
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Get latest version from npm
        id: npm-latest
        run: |
          LATEST=$(npm view @ikieaneh/opencode-kit version 2>/dev/null || echo "0.0.0")
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "  ℹ️  Latest on npm: v$LATEST"

      - name: Bump patch version
        id: bump
        run: |
          NEXT=$(node -e "
            const [a,b,c] = '${{ steps.npm-latest.outputs.version }}'.split('.').map(Number);
            console.log(\`\${a}.\${b}.\${c+1}\`);
          ")
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "  🚀 Bumping to: v$NEXT"

      - name: Update package.json version
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ steps.bump.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Sync .claude-plugin/plugin.json version
        run: |
          if [ -f .claude-plugin/plugin.json ]; then
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('.claude-plugin/plugin.json', 'utf8'));
              p.version = '${{ steps.bump.outputs.version }}';
              fs.writeFileSync('.claude-plugin/plugin.json', JSON.stringify(p, null, 2) + '\n');
            "
          fi

      - name: Commit version bump [skip ci]
        run: |
          git config user.name "opencode-kit CI"
          git config user.email "ci@opencode-kit"
          git add package.json .claude-plugin/plugin.json
          git commit -m "chore: bump to v${{ steps.bump.outputs.version }} [skip ci]"
          git push

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: |
          node test/integration.test.js
          node test/e2e.test.js

      - name: Create and push tag
        run: |
          git tag "v${{ steps.bump.outputs.version }}" -m "chore: release v${{ steps.bump.outputs.version }}"
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
