name: release
on:
  push:
    branches: [main]

jobs:
  publish:
    name: Tag + Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Check if already published on npm
        id: check
        run: |
          PKG="@ikieaneh/opencode-kit"
          VER=$(node -p "require('./package.json').version")
          echo "tag=v$VER" >> "$GITHUB_OUTPUT"
          if npm view "$PKG@$VER" version &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "  ℹ️  $PKG@$VER already published — skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "  🚀 New version: $PKG@$VER"
          fi

      - name: Install dependencies
        if: steps.check.outputs.exists == 'false'
        run: npm install

      - name: Run tests
        if: steps.check.outputs.exists == 'false'
        run: |
          node test/integration.test.js
          node test/e2e.test.js

      - name: Create tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "opencode-kit CI"
          git config user.email "ci@opencode-kit"
          git tag "${{ steps.check.outputs.tag }}" -m "chore: release ${{ steps.check.outputs.tag }}"
          git push origin "${{ steps.check.outputs.tag }}"

      - name: Publish to npm
        if: steps.check.outputs.exists == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
